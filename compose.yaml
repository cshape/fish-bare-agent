# docker compose up --build
#
# Note for local macOS dev (Docker Desktop / Colima): UDP port forwarding is
# unreliable, so WebRTC media may not connect through the VM. Run natively
# instead (npm start + `cd gateway && go run -tags nolibopusfile .`).
# On a Linux host this compose file works as-is; set GATEWAY_PUBLIC_IP to the
# host's reachable address so ICE candidates point outside the container.
services:
  engine:
    build: .
    env_file: .env
    environment:
      GATEWAY_URL: http://gateway:8788
    ports:
      - "8787:8787"
  gateway:
    build: gateway
    environment:
      ENGINE_URL: ws://engine:8787
      PUBLIC_IP: ${GATEWAY_PUBLIC_IP:-}
    ports:
      - "8788:8788"
      - "7881:7881/udp"
