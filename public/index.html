<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>fish bare agent</title>
  <style>
    :root {
      --bg: #f6f4ef;
      --panel: #ffffff;
      --panel-2: #faf8f4;
      --border: #e6e1d7;
      --text: #35322c;
      --dim: #97917f;
      --coral: #e8927c;
      --coral-soft: #fbe3da;
      --blue: #93b8d8;
      --blue-soft: #e3edf6;
      --sage: #a3c4a8;
      --lavender: #ece9f4;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, -apple-system, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      height: 100dvh;
    }
    #shell {
      width: min(720px, 100%);
      display: flex;
      flex-direction: column;
      padding: 20px 16px;
      gap: 14px;
    }
    header {
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px 18px;
      box-shadow: 0 1px 3px rgba(60, 50, 30, 0.05);
    }
    .title-row { display: flex; align-items: center; gap: 10px; }
    .title-row h1 { font-size: 15px; font-weight: 700; margin: 0; letter-spacing: -0.01em; }
    .title-row .sub { color: var(--dim); font-size: 12.5px; margin-left: auto; }
    #orb {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--border); transition: background 0.2s;
      flex: none;
    }
    #orb.idle { background: var(--sage); }
    #orb.listening { background: var(--coral); }
    #orb.speaking { background: var(--blue); }
    #metrics {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    .chip {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 8px 10px;
      text-align: center;
    }
    .chip .label {
      font-size: 10.5px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--dim);
      display: block;
      margin-bottom: 2px;
      white-space: nowrap;
    }
    .chip .value {
      font-size: 16px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }
    .chip .value .unit { font-size: 11px; font-weight: 500; color: var(--dim); }
    .chip.hero { background: var(--lavender); border-color: #d9d3e8; }
    #eager-badge {
      display: none;
      font-size: 10px;
      color: #7a6ea8;
      background: #ffffff;
      border: 1px solid #d9d3e8;
      border-radius: 3px;
      padding: 1px 6px;
      margin-left: 6px;
      vertical-align: middle;
      text-transform: none;
      letter-spacing: 0;
    }
    #log {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 6px 2px;
    }
    #hint {
      margin: auto;
      text-align: center;
      color: var(--dim);
      font-size: 14px;
      line-height: 1.8;
    }
    .msg {
      max-width: 78%;
      padding: 10px 14px;
      border-radius: 6px;
      line-height: 1.5;
      font-size: 15px;
      white-space: pre-wrap;
    }
    .msg.user {
      align-self: flex-end;
      background: var(--coral-soft);
      border: 1px solid #f2cfc1;
    }
    .msg.user.partial { background: var(--panel); border: 1px dashed #f2cfc1; color: var(--dim); }
    .msg.agent {
      align-self: flex-start;
      background: var(--blue-soft);
      border: 1px solid #cfdfee;
    }
    .msg.interrupted { opacity: 0.6; }
    footer {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 4px 0 6px;
    }
    #status { color: var(--dim); font-size: 13px; min-width: 170px; text-align: right; }
    button {
      font: inherit;
      font-weight: 600;
      padding: 12px 32px;
      border-radius: 6px;
      border: 1px solid #d97f68;
      cursor: pointer;
      background: var(--coral);
      color: #fff;
      transition: background 0.15s;
    }
    button:hover { background: #de816a; }
    button.stop { background: var(--panel); color: var(--text); border: 1px solid var(--border); }
    button:disabled { opacity: 0.5; cursor: default; }
  </style>
</head>
<body>
  <div id="shell">
    <header>
      <div class="title-row">
        <div id="orb"></div>
        <h1>fish bare agent</h1>
        <span class="sub">deepgram flux &rarr; gemma &rarr; fish tts</span>
      </div>
      <div id="metrics">
        <div class="chip">
          <span class="label">turn detect</span>
          <span class="value" id="m-stt">&mdash;</span>
        </div>
        <div class="chip">
          <span class="label">llm first token</span>
          <span class="value" id="m-llm">&mdash;</span>
        </div>
        <div class="chip">
          <span class="label">tts first audio</span>
          <span class="value" id="m-tts">&mdash;</span>
        </div>
        <div class="chip hero">
          <span class="label">voice &rarr; voice<span id="eager-badge">eager</span></span>
          <span class="value" id="m-total">&mdash;</span>
        </div>
      </div>
    </header>
    <main id="log">
      <div id="hint">
        Tap <b>Start</b>, allow the mic, and just talk.<br />
        Interrupt it mid-sentence &mdash; it will stop and listen.
      </div>
    </main>
    <footer>
      <span id="status">ready when you are</span>
      <button id="btn">Start</button>
    </footer>
  </div>
  <script type="module" src="/app.js"></script>
</body>
</html>
